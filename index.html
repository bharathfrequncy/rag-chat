<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat with your docs</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .app {
      display: flex;
      width: 900px;
      height: 90vh;
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #e5e5e0;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 240px;
      background: #fafaf8;
      border-right: 1px solid #e5e5e0;
      display: flex;
      flex-direction: column;
      padding: 20px 16px;
      gap: 14px;
    }

    .sidebar-title { font-size: 15px; font-weight: 600; color: #111; }
    .sidebar-sub   { font-size: 12px; color: #888; margin-top: -10px; }

    .upload-area {
      border: 1.5px dashed #d0d0c8;
      border-radius: 10px;
      padding: 20px 12px;
      text-align: center;
      cursor: pointer;
      transition: background 0.15s;
    }
    .upload-area:hover { background: #f0f0eb; }
    .upload-area input { display: none; }

    .upload-icon {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: #e6f1fb;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 8px;
    }
    .upload-icon svg { width: 16px; height: 16px; stroke: #185FA5; fill: none; stroke-width: 2; }
    .upload-label { font-size: 12px; font-weight: 600; color: #333; }
    .upload-hint  { font-size: 11px; color: #aaa; margin-top: 3px; }

    .doc-list { display: flex; flex-direction: column; gap: 8px; }

    .doc-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px;
      background: #f0f0eb;
      border-radius: 8px;
    }
    .doc-icon {
      width: 28px; height: 28px; border-radius: 6px;
      background: #e6f1fb;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .doc-icon svg { width: 13px; height: 13px; stroke: #185FA5; fill: none; stroke-width: 2; }
    .doc-name { font-size: 12px; font-weight: 500; color: #222; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .doc-size { font-size: 11px; color: #aaa; }
    .doc-badge {
      margin-left: auto; flex-shrink: 0;
      font-size: 10px; font-weight: 600;
      background: #e1f5ee; color: #0F6E56;
      padding: 2px 8px; border-radius: 10px;
    }
    .doc-remove {
      margin-left: 4px; flex-shrink: 0;
      width: 16px; height: 16px;
      border: none; background: none;
      color: #bbb; cursor: pointer;
      font-size: 14px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
    }
    .doc-remove:hover { color: #e24b4a; }

    .upload-status {
      font-size: 11px; color: #0F6E56;
      text-align: center; display: none;
    }

    .model-badge {
      margin-top: auto;
      background: #f0f0eb;
      border-radius: 8px;
      padding: 8px 10px;
    }
    .model-label { font-size: 11px; color: #aaa; margin-bottom: 2px; }
    .model-name  { font-size: 12px; font-weight: 600; color: #222; }
    .model-free  { font-size: 10px; color: #0F6E56; margin-top: 2px; }

    /* ── Chat ── */
    .chat { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    .chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid #e5e5e0;
      background: #fff;
    }
    .chat-header-title { font-size: 15px; font-weight: 600; color: #111; }
    .chat-header-sub   { font-size: 12px; color: #888; margin-top: 2px; }

    .messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .msg { display: flex; gap: 10px; align-items: flex-start; }
    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600;
      flex-shrink: 0;
    }
    .avatar.ai   { background: #e1f5ee; color: #0F6E56; }
    .avatar.user { background: #e6f1fb; color: #185FA5; }

    .bubble {
      max-width: 75%;
      padding: 10px 14px;
      font-size: 14px;
      line-height: 1.65;
      border-radius: 14px;
    }
    .bubble.ai {
      background: #f5f5f0;
      color: #111;
      border-radius: 2px 14px 14px 14px;
    }
    .bubble.user {
      background: #e6f1fb;
      color: #042C53;
      border-radius: 14px 2px 14px 14px;
    }

    .source-pills { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
    .source-pill {
      font-size: 11px;
      background: #fff;
      border: 1px solid #e0e0da;
      color: #777;
      padding: 2px 8px;
      border-radius: 10px;
    }

    .typing-bubble {
      background: #f5f5f0;
      border-radius: 2px 14px 14px 14px;
      padding: 12px 16px;
      display: flex; gap: 5px; align-items: center;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #bbb;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    .empty-state {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #bbb; gap: 10px; text-align: center;
    }
    .empty-icon { font-size: 36px; }
    .empty-title { font-size: 15px; font-weight: 600; color: #999; }
    .empty-sub   { font-size: 13px; color: #bbb; }

    /* ── Input ── */
    .input-area {
      padding: 14px 16px;
      border-top: 1px solid #e5e5e0;
      background: #fff;
      display: flex; gap: 10px; align-items: flex-end;
    }
    .input-box {
      flex: 1;
      border: 1px solid #e0e0da;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      color: #111;
      background: #fafaf8;
      resize: none;
      outline: none;
      font-family: inherit;
      transition: border-color 0.15s;
      max-height: 120px;
    }
    .input-box:focus { border-color: #1D9E75; }
    .input-box::placeholder { color: #bbb; }

    .send-btn {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: #1D9E75;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, opacity 0.15s;
      flex-shrink: 0;
    }
    .send-btn:hover { background: #0F6E56; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .send-btn svg { width: 16px; height: 16px; stroke: #fff; fill: none; stroke-width: 2; }
  </style>
</head>
<body>
<div class="app">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-title">Chat with docs</div>
    <div class="sidebar-sub">Upload files to get started</div>

    <label class="upload-area" id="uploadArea">
      <input type="file" id="fileInput" accept=".pdf,.txt" multiple />
      <div class="upload-icon">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      </div>
      <div class="upload-label">Click or drop files</div>
      <div class="upload-hint">PDF · TXT supported</div>
    </label>

    <div class="upload-status" id="uploadStatus">Indexing...</div>

    <div class="doc-list" id="docList"></div>

    <div class="model-badge">
      <div class="model-label">Model</div>
      <div class="model-name">Llama 3.3 70B</div>
      <div class="model-free">via OpenRouter · free</div>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat">
    <div class="chat-header">
      <div class="chat-header-title">Ask your documents</div>
      <div class="chat-header-sub" id="chatSub">No documents uploaded yet</div>
    </div>

    <div class="messages" id="messages">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">📄</div>
        <div class="empty-title">No documents yet</div>
        <div class="empty-sub">Upload a PDF or TXT file to start chatting</div>
      </div>
    </div>

    <div class="input-area">
      <textarea
        class="input-box"
        id="questionInput"
        rows="1"
        placeholder="Ask anything about your documents..."
      ></textarea>
      <button class="send-btn" id="sendBtn" disabled>
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
  const API = 'https://rag-chat-8s4y.onrender.com';
  let docCount = 0;
  let chunkCount = 0;

  const fileInput    = document.getElementById('fileInput');
  const uploadStatus = document.getElementById('uploadStatus');
  const docList      = document.getElementById('docList');
  const messages     = document.getElementById('messages');
  const emptyState   = document.getElementById('emptyState');
  const questionInput= document.getElementById('questionInput');
  const sendBtn      = document.getElementById('sendBtn');
  const chatSub      = document.getElementById('chatSub');
  const uploadArea   = document.getElementById('uploadArea');

  // Drag and drop
  uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.style.background = '#e8f4ff'; });
  uploadArea.addEventListener('dragleave', () => { uploadArea.style.background = ''; });
  uploadArea.addEventListener('drop', e => {
    e.preventDefault();
    uploadArea.style.background = '';
    [...e.dataTransfer.files].forEach(uploadFile);
  });

  fileInput.addEventListener('change', () => {
    [...fileInput.files].forEach(uploadFile);
    fileInput.value = '';
  });

  async function uploadFile(file) {
    uploadStatus.style.display = 'block';
    uploadStatus.textContent = `Indexing ${file.name}...`;

    const form = new FormData();
    form.append('file', file);

    try {
      const res = await fetch(`${API}/upload`, { method: 'POST', body: form });
      if (!res.ok) throw new Error('Upload failed');

      docCount++;
      uploadStatus.textContent = `${file.name} indexed!`;
      setTimeout(() => { uploadStatus.style.display = 'none'; }, 2000);

      addDocItem(file.name, file.size);
      chatSub.textContent = `${docCount} document${docCount > 1 ? 's' : ''} indexed`;
      sendBtn.disabled = false;

      if (emptyState) emptyState.remove();
      if (docCount === 1) addAIMessage("I've indexed your document. Ask me anything about it!");

    } catch (err) {
      uploadStatus.textContent = 'Upload failed. Is the server running?';
      uploadStatus.style.color = '#e24b4a';
      setTimeout(() => {
        uploadStatus.style.display = 'none';
        uploadStatus.style.color = '#0F6E56';
      }, 3000);
    }
  }

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(0) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }

  function addDocItem(name, size) {
    const item = document.createElement('div');
    item.className = 'doc-item';
    item.innerHTML = `
      <div class="doc-icon">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      </div>
      <div style="overflow:hidden;flex:1;">
        <div class="doc-name">${name}</div>
        <div class="doc-size">${formatSize(size)}</div>
      </div>
      <div class="doc-badge">indexed</div>
    `;
    docList.appendChild(item);
  }

  // Auto-resize textarea
  questionInput.addEventListener('input', () => {
    questionInput.style.height = 'auto';
    questionInput.style.height = Math.min(questionInput.scrollHeight, 120) + 'px';
  });

  questionInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendQuestion();
    }
  });

  sendBtn.addEventListener('click', sendQuestion);

  async function sendQuestion() {
    const q = questionInput.value.trim();
    if (!q || sendBtn.disabled) return;

    addUserMessage(q);
    questionInput.value = '';
    questionInput.style.height = 'auto';
    sendBtn.disabled = true;

    const typingEl = addTypingIndicator();

    try {
      const res = await fetch(`${API}/ask`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: q })
      });
      const data = await res.json();
      typingEl.remove();

      if (data.error) {
        addAIMessage(data.error, []);
      } else {
        addAIMessage(data.answer, data.sources || []);
      }
    } catch (err) {
      typingEl.remove();
      addAIMessage('Could not reach the server. Make sure uvicorn is running.');
    } finally {
      sendBtn.disabled = false;
      questionInput.focus();
    }
  }

  function addUserMessage(text) {
    const msg = document.createElement('div');
    msg.className = 'msg user';
    msg.innerHTML = `
      <div class="avatar user">U</div>
      <div class="bubble user">${escHtml(text)}</div>
    `;
    messages.appendChild(msg);
    scrollBottom();
  }

  function addAIMessage(text, sources = []) {
    const sourcesHtml = sources.length
      ? `<div class="source-pills">${sources.map(s =>
          `<span class="source-pill">${escHtml(s.split('\\').pop().split('/').pop())}</span>`
        ).join('')}</div>`
      : '';

    const msg = document.createElement('div');
    msg.className = 'msg';
    msg.innerHTML = `
      <div class="avatar ai">AI</div>
      <div class="bubble ai">${escHtml(text)}${sourcesHtml}</div>
    `;
    messages.appendChild(msg);
    scrollBottom();
  }

  function addTypingIndicator() {
    const msg = document.createElement('div');
    msg.className = 'msg';
    msg.innerHTML = `
      <div class="avatar ai">AI</div>
      <div class="typing-bubble">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
    `;
    messages.appendChild(msg);
    scrollBottom();
    return msg;
  }

  function scrollBottom() {
    messages.scrollTop = messages.scrollHeight;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }
</script>
</body>
</html>
